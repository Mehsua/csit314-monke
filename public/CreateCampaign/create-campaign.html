<!DOCTYPE html>
<html>
<head>
    <title>Create Campaign</title>
</head>
<body>

    <h1>Create Campaign</h1>

    <form id="create-campaign-form">
        <label for="title">Enter campaign title</label>
        <input type="text" id="title" placeholder="Campaign Title" required><br>
        <label for="category">Enter campaign category</label>
        <input type="text" id="category" placeholder="Category" required><br>
        <label for="description">Enter campaign description</label>
        <textarea id="description" placeholder="Description"></textarea><br>
        <label for="targetAmount">Enter target amount</label>
        <input type="number" id="targetAmount" placeholder="Target Amount" required><br>
        <label for="deadline">Enter deadline</label>
        <input type="date" id="deadline" required><br>

        <button type="submit">Create Campaign</button>
    </form>

    <p id="message"></p>

    <script src="/CreateCampaign/CreateCampaignPage.js"></script>

</body>
</html>
